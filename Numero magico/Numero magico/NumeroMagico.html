     <section class="Juego">
        <h1>Adivinemos el número</h1>
     <div class="container">
        <p>Estoy pensando en un número entre 1 y 10. ¿Puedes adivinarlo?</p>
     </div>
     <form id="Casilla">

        <input type="number" placeholder="Ingresa un número" id="Numero">
        <button class="adivina" type="submit">Adivinar</button>

     </form>

     <button class="reset" type="button" onclick="reinicio()">Reiniciar</button>
     <p id="Mensaje"></p>

    </section>

</body>
